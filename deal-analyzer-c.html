<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const fmtShort = (n) => { if (Math.abs(n) >= 1e6) return "$" + (n/1e6).toFixed(2) + "M"; if (Math.abs(n) >= 1e3) return "$" + (n/1e3).toFixed(0) + "k"; return "$" + Math.round(n); };
const fmtPct = (n, d=2) => n.toFixed(d) + "%";

const DEFINITIONS = {
  "Cap Rate": "Capitalization Rate = NOI / Price.",
  "DSCR": "Debt Service Coverage Ratio. Banks want 1.25x+.",
  "IRR": "Internal Rate of Return. Annualized return accounting for time value of money.",
  "After-Tax IRR": "IRR computed on after-tax cash flows. Accounts for depreciation shield, taxes on operating income, and recapture at sale.",
  "Equity Multiple": "Total cash received / equity invested. 2.0x means you doubled your money.",
  "Depreciation": "Annual tax deduction on the building's value. Residential = 27.5 yr straight-line. Commercial = 39 yr. Land is NOT depreciable.",
  "Bonus Depreciation": "Allows you to take a large chunk of depreciation in year 1 instead of spreading it out. Used with cost-segregation studies. 100% in 2022, phasing down 20% per year.",
  "Cost Segregation": "Engineering study that reclassifies parts of the building into shorter depreciation lives (5/7/15 yr). Combined with bonus depreciation, creates huge year-1 tax savings.",
  "Depreciation Recapture": "When you sell, the IRS recaptures depreciation deductions at a 25% tax rate (cannot exceed your ordinary income tax rate).",
  "Refinance": "Replacing your loan with a new one mid-hold. Cash-out refi pulls equity out tax-free (debt isn't income).",
  "Sensitivity": "How IRR changes when key assumptions vary. Shows the deal's robustness — does it work in a downside scenario?",
  "Preferred Return": "Annual return LP gets paid before GP earns any promote. Typically 6-8% in CRE syndications. Calculated on unreturned LP capital.",
  "Promote": "The GP's share of profits above the LP's preferred return. The 'carried interest' that compensates the sponsor for finding and operating the deal.",
  "Waterfall": "The order in which cash flows are distributed between LP and GP. Common tiers: 1) Pref to LP, 2) Return of LP capital, 3) Return of GP capital, 4) Split remainder per agreed promote.",
  "European Waterfall": "LP-friendly structure where LPs receive 100% of cash flow until they hit a target IRR, then GP shares in the excess. Common in institutional and fund structures.",
};

// ===== ASSET-CLASS PRESETS =====
const ASSET_PRESETS = {
  "multifamily": { name: "Multifamily", icon: "🏢", price: 2_400_000, gpr: 380_000, otherIncome: 12_000, vacancy: 6, opex: 152_000, mgmt: 5, debt: 1_800_000, rate: 7.25, amort: 25, ioYears: 0, closingPct: 2.5, capexEvents: [], holdYears: 5, rentGrowth: 3, expenseGrowth: 3, exitCap: 7.5, sellingCosts: 5, depYears: 27.5, landPct: 20 },
  "hotel": { name: "Hotel", icon: "🏨", price: 4_800_000, gpr: 1_400_000, otherIncome: 90_000, vacancy: 35, opex: 720_000, mgmt: 4, debt: 3_360_000, rate: 8.0, amort: 25, ioYears: 1, closingPct: 3, capexEvents: [{id: "h1", year: 0, amount: 150_000, label: "Lobby & guestroom refresh"}, {id: "h2", year: 2, amount: 50_000, label: "PIP work"}], holdYears: 5, rentGrowth: 4, expenseGrowth: 3.5, exitCap: 8.5, sellingCosts: 6, depYears: 39, landPct: 15 },
  "str": { name: "STR", icon: "🏖", price: 950_000, gpr: 165_000, otherIncome: 8_000, vacancy: 35, opex: 38_000, mgmt: 25, debt: 712_500, rate: 8.0, amort: 30, ioYears: 0, closingPct: 3, capexEvents: [{id: "s1", year: 0, amount: 35_000, label: "Furniture & design"}], holdYears: 5, rentGrowth: 3, expenseGrowth: 3, exitCap: 7, sellingCosts: 6, depYears: 27.5, landPct: 25 },
  "storage": { name: "Self-Storage", icon: "🔒", price: 3_200_000, gpr: 480_000, otherIncome: 35_000, vacancy: 10, opex: 145_000, mgmt: 6, debt: 2_400_000, rate: 7.5, amort: 25, ioYears: 0, closingPct: 2.5, capexEvents: [{id: "st1", year: 0, amount: 50_000, label: "Signage & security"}], holdYears: 7, rentGrowth: 5, expenseGrowth: 3, exitCap: 6.5, sellingCosts: 5, depYears: 39, landPct: 25 },
  "mhp": { name: "Mobile Home Park", icon: "🏘", price: 1_800_000, gpr: 285_000, otherIncome: 10_000, vacancy: 8, opex: 95_000, mgmt: 6, debt: 1_350_000, rate: 7.75, amort: 25, ioYears: 0, closingPct: 3, capexEvents: [{id: "m1", year: 0, amount: 40_000, label: "Infrastructure repair"}, {id: "m2", year: 1, amount: 20_000, label: "Pad upgrades"}], holdYears: 7, rentGrowth: 5, expenseGrowth: 3, exitCap: 7, sellingCosts: 5, depYears: 39, landPct: 40 },
  "office": { name: "Office / Flex", icon: "🏛", price: 3_500_000, gpr: 410_000, otherIncome: 18_000, vacancy: 12, opex: 165_000, mgmt: 4, debt: 2_450_000, rate: 7.75, amort: 25, ioYears: 1, closingPct: 3, capexEvents: [{id: "o1", year: 0, amount: 60_000, label: "TI allowance"}, {id: "o2", year: 2, amount: 40_000, label: "Common area refresh"}], holdYears: 5, rentGrowth: 2.5, expenseGrowth: 3, exitCap: 8.5, sellingCosts: 5, depYears: 39, landPct: 20 },
};

const STORAGE_KEY = "dealAnalyzerPro_v1";

function calcIRR(cashFlows, guess = 0.1) {
  let rate = guess;
  for (let i = 0; i < 100; i++) {
    let npv = 0, dnpv = 0;
    for (let t = 0; t < cashFlows.length; t++) {
      npv += cashFlows[t] / Math.pow(1 + rate, t);
      if (t > 0) dnpv -= t * cashFlows[t] / Math.pow(1 + rate, t + 1);
    }
    if (Math.abs(npv) < 0.01) return rate * 100;
    if (Math.abs(dnpv) < 1e-10) break;
    const newRate = rate - npv / dnpv;
    if (Math.abs(newRate - rate) < 1e-7) return newRate * 100;
    rate = newRate;
    if (rate < -0.99) rate = -0.99;
    if (rate > 10) rate = 10;
  }
  return rate * 100;
}

function App() {
  return (
    <div className="app-shell w-full min-h-screen flex flex-col items-center px-4 sm:px-6">
      <div className="w-full max-w-[720px]">
        <Header />
        <Analyzer />
        <Footer />
      </div>
    </div>
  );
}

function Header() {
  return (
    <div className="pt-8 pb-5 anim-fadeUp">
      <div className="flex items-center gap-2 mb-2 flex-wrap">
        <span className="text-[11px] uppercase tracking-[0.22em]" style={{color: "var(--dim)"}}>Live Underwriting</span>
        <span className="text-[10px] px-2 py-0.5 rounded-full uppercase tracking-wider font-bold pro-shimmer" style={{color: "#1A1410"}}>
          Pro · Tier C
        </span>
      </div>
      <h1 className="font-display text-[36px] sm:text-[44px]" style={{lineHeight: 1.02, fontWeight: 700}}>
        Deal Analyzer
      </h1>
      <p className="text-[14px] mt-3" style={{color: "var(--muted)", lineHeight: 1.55}}>
        Full CRE underwriting suite. Multi-year projections, IRR, tax modeling, sensitivity analysis, refinance scenarios, asset-class presets.
      </p>
    </div>
  );
}

function Analyzer() {
  const [assetClass, setAssetClass] = useState("multifamily");
  const [view, setView] = useState("snapshot"); // snapshot | projection | sensitivity | tax

  const initial = ASSET_PRESETS.multifamily;

  // Deal
  const [price, setPrice] = useState(initial.price);
  const [gpr, setGpr] = useState(initial.gpr);
  const [otherIncome, setOtherIncome] = useState(initial.otherIncome);
  const [vacancy, setVacancy] = useState(initial.vacancy);
  const [opex, setOpex] = useState(initial.opex);
  const [mgmt, setMgmt] = useState(initial.mgmt);
  // Debt
  const [debt, setDebt] = useState(initial.debt);
  const [rate, setRate] = useState(initial.rate);
  const [amort, setAmort] = useState(initial.amort);
  // Advanced
  const [ioYears, setIoYears] = useState(initial.ioYears);
  const [closingPct, setClosingPct] = useState(initial.closingPct);
  const [capex, setCapex] = useState(initial.capexEvents || []);
  // Projection
  const [holdYears, setHoldYears] = useState(initial.holdYears);
  const [rentGrowth, setRentGrowth] = useState(initial.rentGrowth);
  const [expenseGrowth, setExpenseGrowth] = useState(initial.expenseGrowth);
  const [exitCap, setExitCap] = useState(initial.exitCap);
  const [sellingCosts, setSellingCosts] = useState(initial.sellingCosts);
  // Tax
  const [taxEnabled, setTaxEnabled] = useState(false);
  const [taxBracket, setTaxBracket] = useState(32);
  const [depYears, setDepYears] = useState(initial.depYears);
  const [landPct, setLandPct] = useState(initial.landPct);
  const [bonusDep, setBonusDep] = useState(0);
  // Refinance
  const [refiEnabled, setRefiEnabled] = useState(false);
  const [refiYear, setRefiYear] = useState(3);
  const [refiLTV, setRefiLTV] = useState(70);
  const [refiRate, setRefiRate] = useState(7.0);
  const [refiAmort, setRefiAmort] = useState(25);
  // GP/LP Waterfall
  const [waterfallEnabled, setWaterfallEnabled] = useState(false);
  const [waterfallType, setWaterfallType] = useState("pref-split"); // simple | pref-split | promote | european
  const [lpEquityPct, setLpEquityPct] = useState(90);
  const [prefRate, setPrefRate] = useState(8);
  const [prefType, setPrefType] = useState("accrued"); // current | accrued
  const [postPrefLP, setPostPrefLP] = useState(70); // % to LP after pref
  const [hurdle1IRR, setHurdle1IRR] = useState(15);
  const [hurdle1LP, setHurdle1LP] = useState(70);
  const [hurdle2IRR, setHurdle2IRR] = useState(20);
  const [hurdle2LP, setHurdle2LP] = useState(50);
  const [europeanTargetIRR, setEuropeanTargetIRR] = useState(12);
  const [europeanPromoteLP, setEuropeanPromoteLP] = useState(50);

  const [activeExplain, setActiveExplain] = useState(null);
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [showSaveLoad, setShowSaveLoad] = useState(false);

  const applyAssetClass = (key) => {
    const p = ASSET_PRESETS[key];
    setAssetClass(key);
    setPrice(p.price); setGpr(p.gpr); setOtherIncome(p.otherIncome); setVacancy(p.vacancy);
    setOpex(p.opex); setMgmt(p.mgmt); setDebt(p.debt); setRate(p.rate);
    setAmort(p.amort); setIoYears(p.ioYears); setClosingPct(p.closingPct); setCapex(p.capexEvents || []);
    setHoldYears(p.holdYears); setRentGrowth(p.rentGrowth); setExpenseGrowth(p.expenseGrowth);
    setExitCap(p.exitCap); setSellingCosts(p.sellingCosts);
    setDepYears(p.depYears); setLandPct(p.landPct);
  };

  const getCurrentState = () => ({ assetClass, price, gpr, otherIncome, vacancy, opex, mgmt, debt, rate, amort, ioYears, closingPct, capex, holdYears, rentGrowth, expenseGrowth, exitCap, sellingCosts, taxEnabled, taxBracket, depYears, landPct, bonusDep, refiEnabled, refiYear, refiLTV, refiRate, refiAmort, waterfallEnabled, waterfallType, lpEquityPct, prefRate, prefType, postPrefLP, hurdle1IRR, hurdle1LP, hurdle2IRR, hurdle2LP, europeanTargetIRR, europeanPromoteLP });

  const loadState = (s) => {
    setAssetClass(s.assetClass); setPrice(s.price); setGpr(s.gpr); setOtherIncome(s.otherIncome); setVacancy(s.vacancy);
    setOpex(s.opex); setMgmt(s.mgmt); setDebt(s.debt); setRate(s.rate); setAmort(s.amort);
    setIoYears(s.ioYears); setClosingPct(s.closingPct);
    // Backward compat: old saves had numeric capex; new saves have array
    if (Array.isArray(s.capex)) setCapex(s.capex);
    else if (typeof s.capex === "number" && s.capex > 0) setCapex([{id: "legacy", year: 0, amount: s.capex, label: "Day-1 capex"}]);
    else setCapex([]);
    setHoldYears(s.holdYears); setRentGrowth(s.rentGrowth); setExpenseGrowth(s.expenseGrowth);
    setExitCap(s.exitCap); setSellingCosts(s.sellingCosts);
    setTaxEnabled(s.taxEnabled); setTaxBracket(s.taxBracket); setDepYears(s.depYears); setLandPct(s.landPct); setBonusDep(s.bonusDep);
    setRefiEnabled(s.refiEnabled); setRefiYear(s.refiYear); setRefiLTV(s.refiLTV); setRefiRate(s.refiRate); setRefiAmort(s.refiAmort);
    if (s.waterfallEnabled !== undefined) {
      setWaterfallEnabled(s.waterfallEnabled); setWaterfallType(s.waterfallType); setLpEquityPct(s.lpEquityPct);
      setPrefRate(s.prefRate); setPrefType(s.prefType); setPostPrefLP(s.postPrefLP);
      setHurdle1IRR(s.hurdle1IRR); setHurdle1LP(s.hurdle1LP); setHurdle2IRR(s.hurdle2IRR); setHurdle2LP(s.hurdle2LP);
      setEuropeanTargetIRR(s.europeanTargetIRR); setEuropeanPromoteLP(s.europeanPromoteLP);
    }
  };

  // ============= YEAR 1 (Snapshot) =============
  const calc = useMemo(() => {
    const vacancyLoss = gpr * (vacancy / 100);
    const egi = gpr - vacancyLoss + otherIncome;
    const mgmtFee = egi * (mgmt / 100);
    const totalOpex = opex + mgmtFee;
    const noi = egi - totalOpex;
    const closingCosts = price * (closingPct / 100);
    const downPayment = Math.max(price - debt, 0);
    const day1Capex = (capex || []).filter(e => e.year === 0).reduce((s, e) => s + (e.amount || 0), 0);
    const equity = downPayment + closingCosts + day1Capex;
    const r = (rate / 100) / 12;
    const n = amort * 12;
    const monthlyPI = debt > 0 && r > 0 ? (debt * r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1) : 0;
    const monthlyIO = debt > 0 ? debt * r : 0;
    const inIO = ioYears > 0;
    const monthly = inIO ? monthlyIO : monthlyPI;
    const annualDebt = monthly * 12;
    const cap = (noi / price) * 100;
    const dscr = annualDebt > 0 ? noi / annualDebt : 0;
    const cashFlow = noi - annualDebt;
    const coc = equity > 0 ? (cashFlow / equity) * 100 : 0;
    return { noi, egi, vacancyLoss, mgmtFee, totalOpex, equity, closingCosts, downPayment, day1Capex, monthly, annualDebt, cap, dscr, cashFlow, coc, inIO, monthlyPI };
  }, [price, gpr, otherIncome, vacancy, opex, mgmt, debt, rate, amort, ioYears, closingPct, capex]);

  // ============= MULTI-YEAR PROJECTION (with refi + tax) =============
  const projection = useMemo(() => {
    const years = [];
    const buildingValue = price * (1 - landPct / 100);
    const straightLineAnnual = buildingValue / depYears;
    const bonusDepAmt = buildingValue * (bonusDep / 100);

    // Initial loan
    let loanBalance = debt;
    let currentRate = rate;
    let currentAmort = amort;
    let r = (currentRate / 100) / 12;
    let n = currentAmort * 12;
    let monthlyPI = loanBalance > 0 && r > 0 ? (loanBalance * r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1) : 0;

    let currentGpr = gpr;
    let currentOtherIncome = otherIncome;
    let currentOpex = opex;
    let cumulativeDep = 0;
    let refiCashOut = 0;

    for (let y = 1; y <= holdYears; y++) {
      // Refinance happens at start of refi year
      if (refiEnabled && y === refiYear) {
        const newLoan = price * (refiLTV / 100);
        refiCashOut = newLoan - loanBalance;
        loanBalance = newLoan;
        currentRate = refiRate;
        currentAmort = refiAmort;
        r = (currentRate / 100) / 12;
        n = currentAmort * 12;
        monthlyPI = loanBalance > 0 && r > 0 ? (loanBalance * r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1) : 0;
      }

      const inIOPeriod = y <= ioYears && !(refiEnabled && y >= refiYear);
      const monthlyIO = loanBalance * r;
      const yearMonthly = inIOPeriod ? monthlyIO : monthlyPI;
      const yearDebt = yearMonthly * 12;

      let yearPrincipal = 0;
      let yearInterest = 0;
      if (loanBalance > 0) {
        if (inIOPeriod) {
          yearInterest = yearDebt;
        } else {
          for (let m = 0; m < 12; m++) {
            const interestM = loanBalance * r;
            const principalM = Math.min(yearMonthly - interestM, loanBalance);
            yearInterest += interestM;
            yearPrincipal += principalM;
            loanBalance -= principalM;
            if (loanBalance < 0) loanBalance = 0;
          }
        }
      }

      const vacancyLoss = currentGpr * (vacancy / 100);
      const egi = currentGpr - vacancyLoss + currentOtherIncome;
      const mgmtFee = egi * (mgmt / 100);
      const totalOpex = currentOpex + mgmtFee;
      const noi = egi - totalOpex;
      const cashFlow = noi - yearDebt;
      const yearCapex = (capex || []).filter(e => e.year === y).reduce((s, e) => s + (e.amount || 0), 0);
      const cashFlowAfterRefi = cashFlow + (y === refiYear && refiEnabled ? refiCashOut : 0) - yearCapex;

      // Depreciation
      const depThisYear = (y === 1 ? bonusDepAmt : 0) + straightLineAnnual;
      cumulativeDep += depThisYear;
      // Taxable income = NOI − interest − depreciation
      const taxableIncome = noi - yearInterest - depThisYear;
      const taxOwed = taxEnabled ? Math.max(0, taxableIncome) * (taxBracket / 100) : 0;
      const taxSavings = taxEnabled && taxableIncome < 0 ? Math.abs(taxableIncome) * (taxBracket / 100) : 0;
      const afterTaxCashFlow = cashFlowAfterRefi - taxOwed + taxSavings;

      years.push({ year: y, gpr: currentGpr, otherIncome: currentOtherIncome, egi, opex: currentOpex, mgmtFee, totalOpex, noi, debtService: yearDebt, principal: yearPrincipal, interest: yearInterest, loanBalance, cashFlow: cashFlowAfterRefi, refiCashOut: (y === refiYear && refiEnabled ? refiCashOut : 0), capex: yearCapex, depreciation: depThisYear, taxableIncome, taxOwed, taxSavings, afterTaxCashFlow });

      currentGpr *= (1 + rentGrowth / 100);
      currentOtherIncome *= (1 + rentGrowth / 100);
      currentOpex *= (1 + expenseGrowth / 100);
    }

    // Exit
    const finalYearNoi = years[years.length - 1].noi * (1 + rentGrowth / 100);
    const grossSalePrice = finalYearNoi / (exitCap / 100);
    const sellingCostsAmt = grossSalePrice * (sellingCosts / 100);
    const netSalePrice = grossSalePrice - sellingCostsAmt;
    const finalLoanBalance = years[years.length - 1].loanBalance;
    const grossSaleProceeds = netSalePrice - finalLoanBalance;

    // Depreciation recapture at sale (25% on cumulative dep, capped at gain)
    const taxableGain = netSalePrice - (price - cumulativeDep);
    const depRecapture = taxEnabled ? Math.min(cumulativeDep, Math.max(0, taxableGain)) * 0.25 : 0;
    const capitalGain = taxEnabled ? Math.max(0, taxableGain - cumulativeDep) * 0.20 : 0;
    const exitTax = depRecapture + capitalGain;
    const netSaleProceeds = grossSaleProceeds - exitTax;

    const totalCashFlow = years.reduce((sum, y) => sum + y.cashFlow, 0);
    const totalAfterTaxCF = years.reduce((sum, y) => sum + y.afterTaxCashFlow, 0);
    const totalProceeds = totalCashFlow + grossSaleProceeds;
    const totalAfterTaxProceeds = totalAfterTaxCF + netSaleProceeds;
    const profit = totalProceeds - calc.equity;
    const afterTaxProfit = totalAfterTaxProceeds - calc.equity;
    const equityMultiple = calc.equity > 0 ? totalProceeds / calc.equity : 0;
    const afterTaxEquityMultiple = calc.equity > 0 ? totalAfterTaxProceeds / calc.equity : 0;
    const avgCoC = calc.equity > 0 ? (totalCashFlow / holdYears / calc.equity) * 100 : 0;

    // IRR (pre-tax)
    const irrCF = [-calc.equity];
    for (let i = 0; i < years.length; i++) {
      irrCF.push(years[i].cashFlow + (i === years.length - 1 ? grossSaleProceeds : 0));
    }
    const irr = calcIRR(irrCF);

    // After-tax IRR
    const afterTaxIrrCF = [-calc.equity];
    for (let i = 0; i < years.length; i++) {
      afterTaxIrrCF.push(years[i].afterTaxCashFlow + (i === years.length - 1 ? netSaleProceeds : 0));
    }
    const afterTaxIrr = calcIRR(afterTaxIrrCF);

    return { years, grossSalePrice, sellingCostsAmt, netSalePrice, finalLoanBalance, grossSaleProceeds, netSaleProceeds, totalCashFlow, totalAfterTaxCF, totalProceeds, totalAfterTaxProceeds, profit, afterTaxProfit, equityMultiple, afterTaxEquityMultiple, avgCoC, irr, afterTaxIrr, cumulativeDep, depRecapture, capitalGain, exitTax, bonusDepAmt, straightLineAnnual };
  }, [price, gpr, otherIncome, vacancy, opex, mgmt, debt, rate, amort, ioYears, calc.equity, holdYears, rentGrowth, expenseGrowth, exitCap, sellingCosts, taxEnabled, taxBracket, depYears, landPct, bonusDep, refiEnabled, refiYear, refiLTV, refiRate, refiAmort, capex]);

  // ============= SENSITIVITY MATRIX =============
  const sensitivity = useMemo(() => {
    const rentGrowthRange = [-1, -0.5, 0, 0.5, 1].map(d => Math.max(0, rentGrowth + d));
    const exitCapRange = [-1, -0.5, 0, 0.5, 1].map(d => Math.max(3, exitCap + d));
    const matrix = [];
    for (let rg of rentGrowthRange) {
      const row = [];
      for (let ec of exitCapRange) {
        let curGpr = gpr, curOI = otherIncome, curOpex = opex;
        let bal = debt;
        const r = (rate / 100) / 12;
        const n = amort * 12;
        const mPI = bal > 0 && r > 0 ? (bal * r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1) : 0;
        const mIO = bal > 0 ? bal * r : 0;
        const cfs = [-calc.equity];
        let lastNoi = 0;
        for (let y = 1; y <= holdYears; y++) {
          const inIOP = y <= ioYears;
          const ym = inIOP ? mIO : mPI;
          const yDebt = ym * 12;
          if (!inIOP && bal > 0) {
            for (let m = 0; m < 12; m++) {
              const iM = bal * r;
              const pM = Math.min(ym - iM, bal);
              bal -= pM;
              if (bal < 0) bal = 0;
            }
          }
          const vl = curGpr * (vacancy / 100);
          const egi = curGpr - vl + curOI;
          const mgFee = egi * (mgmt / 100);
          const noi = egi - curOpex - mgFee;
          lastNoi = noi;
          cfs.push(noi - yDebt);
          curGpr *= (1 + rg / 100);
          curOI *= (1 + rg / 100);
          curOpex *= (1 + expenseGrowth / 100);
        }
        const finalNoi = lastNoi * (1 + rg / 100);
        const sp = finalNoi / (ec / 100);
        const np = sp - sp * (sellingCosts / 100) - bal;
        cfs[cfs.length - 1] += np;
        const cellIRR = calcIRR(cfs);
        row.push({ rg, ec, irr: cellIRR });
      }
      matrix.push(row);
    }
    return { matrix, rentGrowthRange, exitCapRange };
  }, [price, gpr, otherIncome, vacancy, opex, mgmt, debt, rate, amort, ioYears, holdYears, rentGrowth, expenseGrowth, exitCap, sellingCosts, calc.equity]);

  // ============= GP/LP WATERFALL =============
  const waterfall = useMemo(() => {
    const lpEquity = calc.equity * (lpEquityPct / 100);
    const gpEquity = calc.equity * ((100 - lpEquityPct) / 100);

    // Build per-year distributable cash flow and the year-N exit proceeds
    const operatingCFs = projection.years.map(y => Math.max(0, y.cashFlow));
    const exitProceeds = projection.grossSaleProceeds;
    // The last year's operating CF stays as operating; exit is separate
    const totalDistributableByYear = operatingCFs.slice();

    // Helper: split a per-year stream + lump-sum exit between LP and GP per waterfall
    const yearsArr = [];
    let lpCapitalUnreturned = lpEquity;
    let gpCapitalUnreturned = gpEquity;
    let accruedPref = 0;
    let lpRunningCFs = [-lpEquity]; // for LP IRR
    let gpRunningCFs = [-gpEquity]; // for GP IRR

    for (let y = 1; y <= projection.years.length; y++) {
      const isExitYear = y === projection.years.length;
      let availableCF = totalDistributableByYear[y - 1];
      let exitCash = isExitYear ? exitProceeds : 0;
      let totalAvail = availableCF + exitCash;

      let lpYear = 0;
      let gpYear = 0;

      if (waterfallType === "simple") {
        // No pref, no return-of-capital logic for splits. Just split everything by lpEquityPct.
        // Return of capital is implicit via pro-rata share.
        lpYear = totalAvail * (lpEquityPct / 100);
        gpYear = totalAvail * ((100 - lpEquityPct) / 100);
        // For tracking purposes, reduce unreturned capital pro-rata (cosmetic)
        lpCapitalUnreturned = Math.max(0, lpCapitalUnreturned - lpYear * (lpCapitalUnreturned / Math.max(lpEquity, 1)));
        gpCapitalUnreturned = Math.max(0, gpCapitalUnreturned - gpYear * (gpCapitalUnreturned / Math.max(gpEquity, 1)));
      } else if (waterfallType === "pref-split") {
        // Tier 1: Pay LP pref (accrued + current year)
        const thisYearPref = lpCapitalUnreturned * (prefRate / 100);
        const totalPrefOwed = accruedPref + thisYearPref;
        const prefPaid = Math.min(totalAvail, totalPrefOwed);
        lpYear += prefPaid;
        totalAvail -= prefPaid;
        accruedPref = totalPrefOwed - prefPaid;

        // Tier 2: Return LP capital
        const lpCapBack = Math.min(totalAvail, lpCapitalUnreturned);
        lpYear += lpCapBack;
        lpCapitalUnreturned -= lpCapBack;
        totalAvail -= lpCapBack;

        // Tier 3: Return GP capital
        const gpCapBack = Math.min(totalAvail, gpCapitalUnreturned);
        gpYear += gpCapBack;
        gpCapitalUnreturned -= gpCapBack;
        totalAvail -= gpCapBack;

        // Tier 4: Remainder splits per postPrefLP
        if (totalAvail > 0) {
          lpYear += totalAvail * (postPrefLP / 100);
          gpYear += totalAvail * ((100 - postPrefLP) / 100);
        }
      } else if (waterfallType === "promote") {
        // Tier 1: Pref
        const thisYearPref = lpCapitalUnreturned * (prefRate / 100);
        const totalPrefOwed = accruedPref + thisYearPref;
        const prefPaid = Math.min(totalAvail, totalPrefOwed);
        lpYear += prefPaid;
        totalAvail -= prefPaid;
        accruedPref = totalPrefOwed - prefPaid;

        // Tier 2: Return LP capital
        const lpCapBack = Math.min(totalAvail, lpCapitalUnreturned);
        lpYear += lpCapBack;
        lpCapitalUnreturned -= lpCapBack;
        totalAvail -= lpCapBack;

        // Tier 3: Return GP capital
        const gpCapBack = Math.min(totalAvail, gpCapitalUnreturned);
        gpYear += gpCapBack;
        gpCapitalUnreturned -= gpCapBack;
        totalAvail -= gpCapBack;

        // Tier 4+: Promote hurdles. Compute LP's running IRR with this year's tentative distribution
        // to decide which hurdle bucket the next dollar falls in. We iterate slice-by-slice.
        if (totalAvail > 0) {
          // Approximation: test LP IRR at current cumulative + small slice
          // Simpler approach: split by which hurdle LP is currently below
          // Determine LP's current IRR based on running CFs
          const testCFs = lpRunningCFs.slice();
          while (testCFs.length < y + 1) testCFs.push(0);
          testCFs[y] = lpYear; // start with what LP already gets
          const currentLpIrr = calcIRR(testCFs);

          let split;
          if (currentLpIrr < hurdle1IRR) split = hurdle1LP;
          else if (currentLpIrr < hurdle2IRR) split = hurdle2LP;
          else split = hurdle2LP; // stays at top tier

          lpYear += totalAvail * (split / 100);
          gpYear += totalAvail * ((100 - split) / 100);
        }
      } else if (waterfallType === "european") {
        // LP gets everything until target IRR is hit, then promote on excess
        const testCFs = lpRunningCFs.slice();
        while (testCFs.length < y + 1) testCFs.push(0);
        testCFs[y] = totalAvail; // if LP got it all
        const ifAllToLP_IRR = calcIRR(testCFs);

        if (ifAllToLP_IRR <= europeanTargetIRR) {
          lpYear = totalAvail;
        } else {
          // Binary search the amount needed to bring LP to target IRR
          let lo = 0, hi = totalAvail;
          for (let i = 0; i < 40; i++) {
            const mid = (lo + hi) / 2;
            const t = lpRunningCFs.slice();
            while (t.length < y + 1) t.push(0);
            t[y] = mid;
            const tIRR = calcIRR(t);
            if (tIRR < europeanTargetIRR) lo = mid;
            else hi = mid;
          }
          const toHitTarget = (lo + hi) / 2;
          const excess = totalAvail - toHitTarget;
          lpYear = toHitTarget + excess * (europeanPromoteLP / 100);
          gpYear = excess * ((100 - europeanPromoteLP) / 100);
        }
        // Update capital tracking cosmetically
        lpCapitalUnreturned = Math.max(0, lpCapitalUnreturned - lpYear);
        gpCapitalUnreturned = Math.max(0, gpCapitalUnreturned - gpYear);
      }

      lpRunningCFs.push(lpYear);
      gpRunningCFs.push(gpYear);

      yearsArr.push({
        year: y,
        totalCF: availableCF,
        exitCF: exitCash,
        lpDist: lpYear,
        gpDist: gpYear,
        lpUnreturned: lpCapitalUnreturned,
        accruedPref: accruedPref,
      });
    }

    const lpTotal = yearsArr.reduce((s, y) => s + y.lpDist, 0);
    const gpTotal = yearsArr.reduce((s, y) => s + y.gpDist, 0);
    const lpProfit = lpTotal - lpEquity;
    const gpProfit = gpTotal - gpEquity;
    const lpEM = lpEquity > 0 ? lpTotal / lpEquity : 0;
    const gpEM = gpEquity > 0 ? gpTotal / gpEquity : 0;
    const lpIRR = calcIRR(lpRunningCFs);
    const gpIRR = calcIRR(gpRunningCFs);
    const lpAvgCoC = lpEquity > 0 ? (yearsArr.slice(0, -1).reduce((s, y) => s + y.lpDist, 0) / Math.max(1, yearsArr.length - 1) / lpEquity) * 100 : 0;
    const gpAvgCoC = gpEquity > 0 ? (yearsArr.slice(0, -1).reduce((s, y) => s + y.gpDist, 0) / Math.max(1, yearsArr.length - 1) / gpEquity) * 100 : 0;

    // GP promote $ = GP total distributions minus GP's pro-rata equity share of total proceeds
    const totalProceeds = projection.totalCashFlow + projection.grossSaleProceeds;
    const gpProRataShare = totalProceeds * ((100 - lpEquityPct) / 100);
    const gpPromoteDollars = Math.max(0, gpTotal - gpProRataShare);

    return {
      lpEquity, gpEquity, years: yearsArr,
      lpTotal, gpTotal, lpProfit, gpProfit,
      lpEM, gpEM, lpIRR, gpIRR, lpAvgCoC, gpAvgCoC, gpPromoteDollars,
    };
  }, [calc.equity, projection.years, projection.grossSaleProceeds, projection.totalCashFlow, waterfallType, lpEquityPct, prefRate, prefType, postPrefLP, hurdle1IRR, hurdle1LP, hurdle2IRR, hurdle2LP, europeanTargetIRR, europeanPromoteLP]);

  const verdict = useMemo(() => {
    const useIRR = taxEnabled ? projection.afterTaxIrr : projection.irr;
    const label = taxEnabled ? "after-tax IRR" : "IRR";
    if (calc.cashFlow < 0 && !refiEnabled) return { tone: "bad", text: "Negative cash flow year 1. You're feeding this deal." };
    if (calc.dscr < 1.2) return { tone: "bad", text: "DSCR too thin. Banks walk. So should you." };
    if (useIRR >= 15 && calc.dscr >= 1.3) return { tone: "good", text: useIRR.toFixed(1) + "% " + label + ". Strong deal." };
    if (useIRR >= 10) return { tone: "warn", text: useIRR.toFixed(1) + "% " + label + ". Acceptable. Stress-test the exit." };
    return { tone: "bad", text: useIRR.toFixed(1) + "% " + label + ". Better deals exist." };
  }, [calc, projection, taxEnabled, refiEnabled]);

  const tone = verdict.tone === "good" ? "var(--accent)" : verdict.tone === "bad" ? "var(--danger)" : "var(--gold)";

  return (
    <div className="anim-fadeUp" style={{animationDelay: "60ms"}}>
      {/* Asset class selector */}
      <div className="mb-4 no-print">
        <div className="text-[11px] uppercase tracking-[0.18em] mb-2 px-1" style={{color: "var(--dim)", fontWeight: 600}}>Asset Class</div>
        <div className="grid grid-cols-3 gap-2">
          {Object.entries(ASSET_PRESETS).map(([k, p]) => (
            <button key={k} onClick={() => applyAssetClass(k)}
              className={"seg-btn text-left p-2.5 rounded-xl " + (assetClass === k ? "active" : "")}
              style={assetClass === k ? {} : {background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--muted)"}}>
              <div className="text-[20px] mb-0.5">{p.icon}</div>
              <div className="text-[11.5px] font-semibold">{p.name}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Action bar */}
      <div className="flex items-center gap-2 mb-4 no-print">
        <button onClick={() => setShowSaveLoad(true)} className="text-[12px] px-3 py-2 rounded-full font-medium" style={{background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--muted)"}}>
          Save / Load
        </button>
        <button onClick={() => window.print()} className="text-[12px] px-3 py-2 rounded-full font-medium ml-auto" style={{background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--muted)"}}>
          Export PDF
        </button>
      </div>

      {/* View tabs */}
      <div className="flex p-1 rounded-xl mb-4 no-print overflow-x-auto" style={{background: "var(--bg-card)", border: "1px solid var(--border)"}}>
        {[
          { id: "snapshot", label: "Snapshot" },
          { id: "projection", label: "Projection" },
          { id: "sensitivity", label: "Sensitivity" },
          { id: "tax", label: "Tax" },
          { id: "gplp", label: "GP/LP" },
        ].map(t => (
          <button key={t.id} onClick={() => setView(t.id)}
            className={"tab-btn flex-1 py-2 px-3 rounded-lg text-[12.5px] font-semibold whitespace-nowrap " + (view === t.id ? "active-tab" : "")}
            style={view !== t.id ? {color: "var(--muted)"} : {}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Print header */}
      <div className="print-only mb-4">
        <div className="font-display text-[24px] font-bold">Deal Analysis · {ASSET_PRESETS[assetClass].name}</div>
        <div className="text-[12px] mt-1" style={{color: "var(--muted)"}}>Price: {fmtShort(price)} · {holdYears}-year hold · Generated {new Date().toLocaleDateString()}</div>
      </div>

      {view === "snapshot" && (
        <SnapshotView calc={calc} amort={amort} closingPct={closingPct} setActiveExplain={setActiveExplain} verdict={verdict} tone={tone}/>
      )}
      {view === "projection" && (
        <ProjectionView projection={projection} calc={calc} holdYears={holdYears} setActiveExplain={setActiveExplain} verdict={verdict} tone={tone} exitCap={exitCap} sellingCosts={sellingCosts} taxEnabled={taxEnabled} refiEnabled={refiEnabled} refiYear={refiYear}/>
      )}
      {view === "sensitivity" && (
        <SensitivityView sensitivity={sensitivity} setActiveExplain={setActiveExplain}/>
      )}
      {view === "tax" && (
        <TaxView projection={projection} taxEnabled={taxEnabled} setActiveExplain={setActiveExplain} bonusDep={bonusDep}/>
      )}
      {view === "gplp" && (
        <WaterfallView waterfall={waterfall} waterfallEnabled={waterfallEnabled} waterfallType={waterfallType} setActiveExplain={setActiveExplain} holdYears={holdYears} lpEquityPct={lpEquityPct}/>
      )}

      {/* Helper banner */}
      <div className="flex items-center gap-2 mb-3 p-3 rounded-xl no-print" style={{background: "rgba(37,99,235,0.07)", border: "1px solid rgba(37,99,235,0.20)"}}>
        <span style={{color: "var(--info)", fontWeight: 700}}>↓</span>
        <p className="text-[12.5px]" style={{color: "var(--muted)", lineHeight: 1.4}}>
          <span style={{color: "var(--info)", fontWeight: 600}}>All four views</span> share the inputs below. Change anything — everything updates.
        </p>
      </div>

      <SectionHeader title="The Deal"/>
      <div className="card p-4 sm:p-5 space-y-4 mb-4">
        <SliderRow label="Purchase Price" value={price} setValue={setPrice} min={250000} max={20000000} step={50000} fmt={fmtShort}/>
        <SliderRow label="Gross Rental Income" value={gpr} setValue={setGpr} min={20000} max={3000000} step={5000} fmt={fmtShort}/>
        <SliderRow label="Other Income" value={otherIncome} setValue={setOtherIncome} min={0} max={500000} step={1000} fmt={fmtShort}/>
        <SliderRow label="Vacancy" value={vacancy} setValue={setVacancy} min={0} max={45} step={0.5} fmt={v => v.toFixed(1) + "%"}/>
        <SliderRow label="Operating Expenses" value={opex} setValue={setOpex} min={5000} max={1500000} step={2500} fmt={fmtShort}/>
        <SliderRow label="Property Mgmt Fee" value={mgmt} setValue={setMgmt} min={0} max={30} step={0.5} fmt={v => v.toFixed(1) + "%"}/>
      </div>

      <SectionHeader title="The Debt"/>
      <div className="card p-4 sm:p-5 space-y-4 mb-4">
        <SliderRow label="Loan Amount" value={debt} setValue={setDebt} min={0} max={Math.floor(price * 0.85)} step={25000} fmt={fmtShort} subtitle={((debt/price)*100).toFixed(0) + "% LTV"}/>
        <SliderRow label="Interest Rate" value={rate} setValue={setRate} min={4} max={12} step={0.125} fmt={v => v.toFixed(3) + "%"}/>
        <SliderRow label="Amortization" value={amort} setValue={setAmort} min={15} max={30} step={5} fmt={v => v + " yr"}/>
      </div>

      <SectionHeader title="The Projection"/>
      <div className="card p-4 sm:p-5 space-y-4 mb-4">
        <SliderRow label="Hold Period" value={holdYears} setValue={setHoldYears} min={3} max={10} step={1} fmt={v => v + " yr"}/>
        <SliderRow label="Rent Growth" value={rentGrowth} setValue={setRentGrowth} min={0} max={8} step={0.25} fmt={v => v.toFixed(2) + "% / yr"}/>
        <SliderRow label="Expense Growth" value={expenseGrowth} setValue={setExpenseGrowth} min={0} max={8} step={0.25} fmt={v => v.toFixed(2) + "% / yr"}/>
        <SliderRow label="Exit Cap Rate" value={exitCap} setValue={setExitCap} min={4} max={12} step={0.1} fmt={v => v.toFixed(2) + "%"}/>
        <SliderRow label="Selling Costs" value={sellingCosts} setValue={setSellingCosts} min={0} max={8} step={0.25} fmt={v => v.toFixed(2) + "%"}/>
      </div>

      {/* Tax modeling */}
      <ToggleSection title="Tax Modeling" enabled={taxEnabled} setEnabled={setTaxEnabled}>
        <SliderRow label="Tax Bracket" value={taxBracket} setValue={setTaxBracket} min={10} max={37} step={1} fmt={v => v + "%"} subtitle="Your marginal income tax rate"/>
        <SliderRow label="Depreciation Years" value={depYears} setValue={setDepYears} min={27.5} max={39} step={11.5} fmt={v => v + " yr"} subtitle="27.5 residential, 39 commercial" onExplain={() => setActiveExplain("Depreciation")}/>
        <SliderRow label="Land %" value={landPct} setValue={setLandPct} min={0} max={50} step={1} fmt={v => v + "%"} subtitle="Non-depreciable portion"/>
        <SliderRow label="Bonus Depreciation" value={bonusDep} setValue={setBonusDep} min={0} max={100} step={5} fmt={v => v + "%"} subtitle="Cost-seg year-1 deduction" onExplain={() => setActiveExplain("Bonus Depreciation")}/>
      </ToggleSection>

      {/* Refinance */}
      <ToggleSection title="Refinance Mid-Hold" enabled={refiEnabled} setEnabled={setRefiEnabled}>
        <SliderRow label="Refi Year" value={refiYear} setValue={setRefiYear} min={2} max={Math.max(2, holdYears - 1)} step={1} fmt={v => "Year " + v}/>
        <SliderRow label="New LTV" value={refiLTV} setValue={setRefiLTV} min={50} max={80} step={1} fmt={v => v + "%"} subtitle="% of current price"/>
        <SliderRow label="New Rate" value={refiRate} setValue={setRefiRate} min={4} max={10} step={0.125} fmt={v => v.toFixed(3) + "%"}/>
        <SliderRow label="New Amort" value={refiAmort} setValue={setRefiAmort} min={15} max={30} step={5} fmt={v => v + " yr"}/>
      </ToggleSection>

      {/* GP/LP Waterfall */}
      <ToggleSection title="GP / LP Waterfall" enabled={waterfallEnabled} setEnabled={setWaterfallEnabled}>
        {/* Waterfall structure selector */}
        <div>
          <div className="text-[13px] font-semibold mb-2" style={{color: "var(--text)"}}>Waterfall Structure</div>
          <div className="grid grid-cols-2 gap-2 mb-1">
            {[
              { id: "simple", label: "Simple Split", desc: "Pro-rata, no pref" },
              { id: "pref-split", label: "Pref + Split", desc: "8% pref then 70/30" },
              { id: "promote", label: "Promote Hurdles", desc: "Pref + IRR tiers" },
              { id: "european", label: "European", desc: "LP target IRR first" },
            ].map(t => (
              <button key={t.id} onClick={() => setWaterfallType(t.id)}
                className={"seg-btn text-left p-2.5 rounded-lg " + (waterfallType === t.id ? "active" : "")}
                style={waterfallType === t.id ? {} : {background: "var(--bg-elev)", border: "1px solid var(--border)", color: "var(--muted)"}}>
                <div className="text-[12.5px] font-semibold">{t.label}</div>
                <div className="text-[10.5px]" style={{opacity: 0.75}}>{t.desc}</div>
              </button>
            ))}

        <SliderRow label="LP Equity Share" value={lpEquityPct} setValue={setLpEquityPct} min={50} max={99} step={1} fmt={v => v + "% LP / " + (100-v) + "% GP"} subtitle="% of total equity contributed by LPs"/>

        {waterfallType !== "simple" && waterfallType !== "european" && (
          <>
            <SliderRow label="Preferred Return" value={prefRate} setValue={setPrefRate} min={0} max={12} step={0.25} fmt={v => v.toFixed(2) + "%"} subtitle="Annual return LP gets first"/>
            <SliderRow label="Post-Pref LP Split" value={postPrefLP} setValue={setPostPrefLP} min={50} max={90} step={1} fmt={v => v + "% LP / " + (100-v) + "% GP"} subtitle="After pref + return of capital"/>
          </>
        )}

        {waterfallType === "promote" && (
          <>
            <SliderRow label="Hurdle 1 IRR" value={hurdle1IRR} setValue={setHurdle1IRR} min={8} max={18} step={0.5} fmt={v => v.toFixed(1) + "%"} subtitle="First promote threshold"/>
            <SliderRow label="Hurdle 1 LP Split" value={hurdle1LP} setValue={setHurdle1LP} min={50} max={90} step={1} fmt={v => v + "% LP / " + (100-v) + "% GP"} subtitle="Split below this IRR"/>
            <SliderRow label="Hurdle 2 IRR" value={hurdle2IRR} setValue={setHurdle2IRR} min={15} max={30} step={0.5} fmt={v => v.toFixed(1) + "%"} subtitle="Second promote threshold"/>
            <SliderRow label="Hurdle 2 LP Split" value={hurdle2LP} setValue={setHurdle2LP} min={30} max={80} step={1} fmt={v => v + "% LP / " + (100-v) + "% GP"} subtitle="Split above hurdle 1"/>
          </>
        )}

        {waterfallType === "european" && (
          <>
            <SliderRow label="LP Target IRR" value={europeanTargetIRR} setValue={setEuropeanTargetIRR} min={6} max={20} step={0.5} fmt={v => v.toFixed(1) + "%"} subtitle="LP gets everything until this IRR"/>
            <SliderRow label="Excess LP Split" value={europeanPromoteLP} setValue={setEuropeanPromoteLP} min={30} max={80} step={1} fmt={v => v + "% LP / " + (100-v) + "% GP"} subtitle="Split above target IRR"/>
          </>
        )}
      </ToggleSection>

      {/* Advanced */}
      <button onClick={() => setShowAdvanced(!showAdvanced)}
        className="w-full mb-4 text-left flex items-center justify-between px-4 py-3 rounded-xl no-print"
        style={{background: "var(--bg-card)", border: "1px dashed var(--border-hi)"}}>
        <span className="text-[13px] font-semibold" style={{color: "var(--muted)"}}>Advanced inputs</span>
        <span className="text-[12px]" style={{color: "var(--dim)"}}>{showAdvanced ? "Hide" : "Show"}</span>
      </button>

      {showAdvanced && (
        <div className="card p-4 sm:p-5 space-y-4 mb-4 anim-fadeUp">
          <SliderRow label="Interest-Only Period" value={ioYears} setValue={setIoYears} min={0} max={5} step={1} fmt={v => v === 0 ? "None" : v + " yr"}/>
          <SliderRow label="Closing Costs" value={closingPct} setValue={setClosingPct} min={0} max={6} step={0.25} fmt={v => v.toFixed(2) + "%"}/>
        </div>
      )}

      <SectionHeader title="Capex Schedule"/>
      <CapexEditor events={capex} setEvents={setCapex} holdYears={holdYears}/>

      {activeExplain && (
        <Definition term={activeExplain} onClose={() => setActiveExplain(null)} />
      )}

      {showSaveLoad && (
        <SaveLoadModal onClose={() => setShowSaveLoad(false)} getCurrentState={getCurrentState} loadState={loadState}/>
      )}
    </div>
  );
}

function SensitivityView({ sensitivity, setActiveExplain }) {
  const { matrix, rentGrowthRange, exitCapRange } = sensitivity;
  const allIRRs = matrix.flat().map(c => c.irr);
  const minIRR = Math.min(...allIRRs);
  const maxIRR = Math.max(...allIRRs);

  const colorFor = (irr) => {
    if (irr >= 15) return { bg: "rgba(0,169,104,0.18)", text: "var(--accent)" };
    if (irr >= 10) return { bg: "rgba(212,145,42,0.18)", text: "var(--gold)" };
    if (irr >= 5) return { bg: "rgba(234,88,12,0.15)", text: "var(--orange)" };
    return { bg: "rgba(220,38,38,0.15)", text: "var(--danger)" };
  };

  return (
    <div className="card-hi p-4 sm:p-5 mb-4">
      <div className="flex items-center justify-between mb-3">
        <div>
          <div className="text-[11px] uppercase tracking-[0.18em]" style={{color: "var(--dim)"}}>IRR Sensitivity</div>
          <div className="font-display text-[18px] mt-1" style={{fontWeight: 700}}>Rent Growth × Exit Cap</div>
        </div>
        <button onClick={() => setActiveExplain("Sensitivity")} className="w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-bold" style={{background: "var(--bg-elev)", border: "1px solid var(--border)", color: "var(--dim)"}}>?</button>
      </div>
      <p className="text-[12px] mb-4" style={{color: "var(--muted)", lineHeight: 1.5}}>
        IRR at each combination of rent growth and exit cap. Range: {minIRR.toFixed(1)}% to {maxIRR.toFixed(1)}%. Green = strong, red = pass.
      </p>

      <div className="overflow-x-auto">
        <div style={{minWidth: 480}}>
          <div className="grid" style={{gridTemplateColumns: "70px repeat(5, 1fr)", gap: 4}}>
            <div className="text-[10px] flex items-end justify-center pb-2" style={{color: "var(--dim)"}}>Rent ↓ / Cap →</div>
            {exitCapRange.map((ec, i) => (
              <div key={i} className="text-[11px] text-center font-mono font-semibold pb-2" style={{color: "var(--muted)"}}>{ec.toFixed(2)}%</div>
            ))}
            {matrix.map((row, ri) => (
              <React.Fragment key={ri}>
                <div className="text-[11px] flex items-center justify-end pr-2 font-mono font-semibold" style={{color: "var(--muted)"}}>{rentGrowthRange[ri].toFixed(2)}%</div>
                {row.map((cell, ci) => {
                  const c = colorFor(cell.irr);
                  return (
                    <div key={ci} className="p-2 rounded text-center font-mono" style={{background: c.bg, border: "1px solid " + c.text + "44"}}>
                      <div className="text-[14px] font-bold" style={{color: c.text}}>{cell.irr.toFixed(1)}%</div>
                    </div>
                  );
                })}
              </React.Fragment>
            ))}
          </div>
        </div>
      </div>

      <div className="hairline my-4"/>

      <div className="space-y-1.5 text-[12px]" style={{color: "var(--muted)"}}>
        <div className="flex items-center gap-2">
          <div className="w-3 h-3 rounded" style={{background: "rgba(0,169,104,0.18)", border: "1px solid var(--accent)"}}></div>
          <span>15%+ — Strong</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="w-3 h-3 rounded" style={{background: "rgba(212,145,42,0.18)", border: "1px solid var(--gold)"}}></div>
          <span>10–15% — Acceptable</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="w-3 h-3 rounded" style={{background: "rgba(234,88,12,0.15)", border: "1px solid var(--orange)"}}></div>
          <span>5–10% — Weak</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="w-3 h-3 rounded" style={{background: "rgba(220,38,38,0.15)", border: "1px solid var(--danger)"}}></div>
          <span>&lt;5% — Pass</span>
        </div>
      </div>
    </div>
  );
}

function SaveLoadModal({ onClose, getCurrentState, loadState }) {
  const [slots, setSlots] = useState([]);
  const [newName, setNewName] = useState("");

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setSlots(JSON.parse(raw));
    } catch (e) { console.error(e); }
  }, []);

  const persist = (newSlots) => {
    setSlots(newSlots);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(newSlots)); } catch (e) { console.error(e); }
  };

  const saveSlot = () => {
    if (!newName.trim()) return;
    const newSlots = [...slots.filter(s => s.name !== newName.trim()), { name: newName.trim(), savedAt: Date.now(), state: getCurrentState() }];
    persist(newSlots);
    setNewName("");
  };

  const deleteSlot = (name) => {
    persist(slots.filter(s => s.name !== name));
  };

  const loadSlot = (state) => {
    loadState(state);
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 py-6" style={{background: "rgba(15,23,41,0.45)"}} onClick={onClose}>
      <div className="w-full max-w-[480px] card p-5" onClick={e => e.stopPropagation()} style={{background: "var(--bg-card)", boxShadow: "0 20px 60px -20px rgba(15,23,41,0.30)"}}>
        <div className="flex items-start justify-between mb-4">
          <div className="font-display text-[22px]" style={{fontWeight: 700}}>Saved Deals</div>
          <button onClick={onClose} className="w-7 h-7 rounded-full flex items-center justify-center" style={{background: "var(--bg-elev)", border: "1px solid var(--border)", color: "var(--muted)"}}>×</button>
        </div>

        <div className="mb-4 p-3 rounded-xl" style={{background: "var(--bg-elev)", border: "1px solid var(--border)"}}>

function CapexEditor({ events, setEvents, holdYears }) {

  const day1 = sorted.filter(e => e.year === 0).reduce((s, e) => s + (e.amount || 0), 0);

  const addEvent = () => {
    const newEvent = { id: "cx-" + Date.now() + "-" + Math.random().toString(36).slice(2, 7), year: 0, amount: 25000, label: "" };

/* ===== Auth gate (CRE U auth integration) =========================
   Wraps the app in a login wall + entitlement check.
   Buy buttons redirect to live Stripe Payment Links via STRIPE_LINKS;
   keys with no link yet fall through to a "coming soon" alert. ======= */
const PRODUCT_CODE = "da_c";
const PRODUCT_NAME = "Deal Analyzer · Pro";

// Live Stripe Payment Links, keyed by product code.
const STRIPE_LINKS = {
  da_b: "https://buy.stripe.com/4gM14o0zV95LfmOc5V0co03",          // Underwriter
  da_c: "https://buy.stripe.com/5kQ6oI3M7gydgqS1rh0co04",          // Pro
  cre_u_lifetime: "https://buy.stripe.com/bJe3cw6Yjdm1fmOgmb0co05", // CRE University Lifetime
};

function AuthGate({ productCode, productName, children }) {
  const [status, setStatus] = React.useState("loading"); // loading | locked | nosub | ready
  const [user, setUser] = React.useState(null);
  const [mode, setMode] = React.useState("signin"); // signin | signup | forgot
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [error, setError] = React.useState("");
  const [info, setInfo] = React.useState("");

  React.useEffect(() => {
    let unsub;
    let cancelled = false;

    // Decide status for a given session. Calls hasEntitlement (a DB query),
    // so this must only run OUTSIDE supabase-js's auth-change lock.
    const evaluate = async (session) => {
      if (!session) { setUser(null); setStatus("locked"); return; }
      setUser(session.user);
      if (productCode === "cre_u_any") {
        const hasLife = await window.CREAuth.hasEntitlement("cre_u_lifetime");
        const hasMo = await window.CREAuth.hasEntitlement("cre_u_monthly");
        if (!cancelled) setStatus(hasLife || hasMo ? "ready" : "nosub");
        return;
      }
      const hasEnt = await window.CREAuth.hasEntitlement(productCode);
      if (!cancelled) setStatus(hasEnt ? "ready" : "nosub");
    };

    const start = async () => {
      if (!window.CREAuth) {
        await new Promise(r => document.addEventListener("creauth:ready", r, { once: true }));
      }
      // Initial check runs outside any auth lock — safe to query directly.
      const session = await window.CREAuth.getSession();
      evaluate(session);
      // onAuthStateChange fires while supabase-js holds its internal auth lock.
      // Awaiting getSession()/DB calls inside it deadlocks (v2 footgun). So: read
      // the session from the callback args (no re-query) and defer the DB work
      // with setTimeout so it runs after the lock releases.
      const { data: { subscription } } = window.CREAuth.onAuthStateChange((_event, session) => {
        setTimeout(() => { if (!cancelled) evaluate(session); }, 0);
      });
      unsub = () => subscription.unsubscribe();
    };

    start();
    return () => { cancelled = true; if (unsub) unsub(); };
  }, [productCode]);

  const handleSubmit = async (e) => {
    e?.preventDefault();
    setError(""); setInfo("");
    if (mode === "signin") {
      const { error } = await window.CREAuth.signIn(email, password);
      if (error) setError(error.message);
    } else if (mode === "signup") {
      const { error } = await window.CREAuth.signUp(email, password);
      if (error) setError(error.message);
      else setInfo("Check your email to confirm your account.");
    } else if (mode === "forgot") {
      const { error } = await window.CREAuth.resetPassword(email);
      if (error) setError(error.message);
      else setInfo("Password reset link sent. Check your email.");
    }
  };

  const handleBuy = (key) => {
    const url = STRIPE_LINKS[key];
    if (url) { window.location.href = url; return; }
    window.alert("That option is coming soon. You're signed in, so access will appear here automatically once it launches.");
  };

  if (status === "loading") {
    return <div className="min-h-screen flex items-center justify-center text-[14px]" style={{color: "var(--muted)"}}>Loading…</div>;
  }

  if (status === "locked") {
    return (
      <div className="min-h-screen flex items-center justify-center p-4" style={{background: "#E6DFD1"}}>
        <div className="w-full max-w-[420px] card-hi p-6">
          <div className="font-display text-[28px] mb-2" style={{fontWeight: 700}}>
            {mode === "signin" ? "Sign in" : mode === "signup" ? "Create account" : "Reset password"}
          </div>
          <p className="text-[13px] mb-5" style={{color: "var(--muted)"}}>
            {mode === "signin" ? "Welcome back." : mode === "signup" ? "Get started — Deal Analyzer A is included free with signup." : "Enter your email and we'll send a reset link."}
          </p>
          <form onSubmit={handleSubmit}>
            <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} required
              className="w-full px-3 py-2.5 mb-3 text-[14px] rounded-lg"
              style={{background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--text)"}}/>
            {mode !== "forgot" && (
              <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} required minLength={6}
                className="w-full px-3 py-2.5 mb-3 text-[14px] rounded-lg"
                style={{background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--text)"}}/>
            )}
            {error && <div className="text-[12.5px] mb-3 p-2.5 rounded-lg" style={{background: "rgba(220,38,38,0.08)", color: "var(--danger)"}}>{error}</div>}
            {info && <div className="text-[12.5px] mb-3 p-2.5 rounded-lg" style={{background: "rgba(0,169,104,0.08)", color: "var(--accent)"}}>{info}</div>}
            <button type="submit" className="w-full py-3 text-[13.5px] uppercase tracking-wider font-bold rounded-xl"
              style={{background: "var(--accent)", color: "#FFF"}}>
              {mode === "signin" ? "Sign in" : mode === "signup" ? "Create account" : "Send reset link"}
            </button>
          </form>
          <div className="mt-4 text-[12px] text-center" style={{color: "var(--muted)"}}>
            {mode === "signin" && (
              <>
                <button onClick={() => { setMode("signup"); setError(""); setInfo(""); }} className="underline">Create account</button>
                {" · "}
                <button onClick={() => { setMode("forgot"); setError(""); setInfo(""); }} className="underline">Forgot password</button>
              </>
            )}
            {mode === "signup" && (
              <button onClick={() => { setMode("signin"); setError(""); setInfo(""); }} className="underline">Have an account? Sign in</button>
            )}
            {mode === "forgot" && (
              <button onClick={() => { setMode("signin"); setError(""); setInfo(""); }} className="underline">Back to sign in</button>
            )}
          </div>
        </div>
      </div>
    );
  }

  if (status === "nosub") {
    const isCreU = productCode === "cre_u_any";
    return (
      <div className="min-h-screen flex items-center justify-center p-4" style={{background: "#E6DFD1"}}>
        <div className="w-full max-w-[460px] card-hi p-6 text-center">
          <div className="font-display text-[28px] mb-2" style={{fontWeight: 700}}>
            Unlock {productName}
          </div>
          <p className="text-[13.5px] mb-5" style={{color: "var(--muted)", lineHeight: 1.55}}>
            You're signed in as <b>{user?.email}</b> but don't have access to this product yet.
          </p>
          {isCreU ? (
            <>
              <button onClick={() => handleBuy("cre_u_lifetime")}
                className="block w-full py-3.5 text-[13.5px] uppercase tracking-wider font-bold rounded-xl mb-3"
                style={{background: "linear-gradient(135deg, var(--gold), var(--gold-2))", color: "#3A2700", boxShadow: "0 4px 0 #A77517"}}>
                Lifetime · $399
              </button>
              <button onClick={() => handleBuy("cre_u_monthly")}
                className="block w-full py-3.5 text-[13.5px] uppercase tracking-wider font-bold rounded-xl mb-3"
                style={{background: "var(--accent)", color: "#FFF"}}>
                Monthly · $49 — Coming soon
              </button>
            </>
          ) : productCode === "da_a" ? (
            <p className="text-[13px] mb-4" style={{color: "var(--muted)", lineHeight: 1.55}}>
              This tool is free with your account. Your access is still finalizing — refresh in a moment, and if it persists, sign out and back in.
            </p>
          ) : (
            <button onClick={() => handleBuy(productCode)}
              className="block w-full py-3.5 text-[13.5px] uppercase tracking-wider font-bold rounded-xl mb-3"
              style={{background: "linear-gradient(135deg, var(--gold), var(--gold-2))", color: "#3A2700", boxShadow: "0 4px 0 #A77517"}}>
              Buy now
            </button>
          )}
          <button onClick={() => window.CREAuth.signOut()} className="text-[12px] underline" style={{color: "var(--muted)"}}>
            Sign out
          </button>
        </div>
      </div>
    );
  }

  return children;
}

function GatedApp() {
  return (
    <AuthGate productCode={PRODUCT_CODE} productName={PRODUCT_NAME}>
      <App />
    </AuthGate>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GatedApp />);
</script>
</body>
</html>
