  input[type="range"]::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: #FFFFFF; border: 2px solid var(--accent); box-shadow: 0 2px 8px rgba(0,169,104,0.30); cursor: pointer; }

  @media (min-width: 720px) { .app-shell { padding-top: 48px; padding-bottom: 64px; } }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

const fmtShort = (n) => {
  if (Math.abs(n) >= 1e6) return "$" + (n/1e6).toFixed(2) + "M";
  if (Math.abs(n) >= 1e3) return "$" + (n/1e3).toFixed(0) + "k";
  return "$" + Math.round(n);
};
const fmtFull = (n) => "$" + Math.round(n).toLocaleString();
const fmtPct = (n, d=2) => n.toFixed(d) + "%";

const DEFINITIONS = {
  "Cap Rate": "Capitalization Rate = NOI / Price. The yield you'd earn buying the property all-cash.",
  "DSCR": "Debt Service Coverage Ratio = NOI / Annual Debt Payment. Banks want 1.25x+.",
  "Cash Flow": "NOI minus annual debt service. What hits your bank account every year after the mortgage is paid.",
  "Cash-on-Cash": "Annual Cash Flow / Total Cash Invested. Your actual return on the money you put down.",
  "NOI": "Net Operating Income = revenue minus operating expenses, before debt service.",
  "IRR": "Internal Rate of Return. The annualized return on your investment accounting for the time value of money. The single most important multi-year metric. Pros want 15%+ for value-add, 10%+ for stabilized.",
  "Equity Multiple": "Total cash you receive / Equity you invested. 2.0x means you doubled your money over the hold. 2.5x+ is good for a 5-yr hold; 3.0x+ for 7-yr.",
  "Average CoC": "Average annual Cash-on-Cash return across the hold period. Smooths out year-1 lumpiness.",
  "Exit Cap": "Cap rate you assume the buyer pays when you sell. Higher exit cap = lower sale price (conservative). Often assume exit cap = entry cap + 0.5%.",
  "Rent Growth": "% you assume rents grow each year. Conservative: 2-3%. Aggressive: 5%+.",
  "Selling Costs": "Broker commission + transfer taxes + legal at sale. Typically 4-6% of sale price.",
};

const PRESETS = {
  "default": { name: "Mid-size MF", price: 2_400_000, gpr: 380_000, otherIncome: 12_000, vacancy: 6, opex: 152_000, mgmt: 5, debt: 1_800_000, rate: 7.25, amort: 25, ioYears: 0, closingPct: 2.5, capex: 0, holdYears: 5, rentGrowth: 3, expenseGrowth: 3, exitCap: 7.5, sellingCosts: 5 },
  "small": { name: "Small 4-plex", price: 850_000, gpr: 145_000, otherIncome: 4_000, vacancy: 6, opex: 60_000, mgmt: 6, debt: 595_000, rate: 7.50, amort: 25, ioYears: 0, closingPct: 3, capex: 15_000, holdYears: 5, rentGrowth: 2.5, expenseGrowth: 2.5, exitCap: 8, sellingCosts: 5 },
  "value-add": { name: "Value-add", price: 1_650_000, gpr: 240_000, otherIncome: 8_000, vacancy: 14, opex: 105_000, mgmt: 5, debt: 1_320_000, rate: 8.25, amort: 25, ioYears: 2, closingPct: 3, capex: 120_000, holdYears: 5, rentGrowth: 5, expenseGrowth: 3, exitCap: 7, sellingCosts: 5 },
};

// IRR via Newton-Raphson
function calcIRR(cashFlows, guess = 0.1) {
  let rate = guess;
  for (let i = 0; i < 100; i++) {
    let npv = 0;
    let dnpv = 0;
    for (let t = 0; t < cashFlows.length; t++) {
      npv += cashFlows[t] / Math.pow(1 + rate, t);
      if (t > 0) dnpv -= t * cashFlows[t] / Math.pow(1 + rate, t + 1);
    }
    if (Math.abs(npv) < 0.01) return rate * 100;
    if (Math.abs(dnpv) < 1e-10) break;
    const newRate = rate - npv / dnpv;
    if (Math.abs(newRate - rate) < 1e-7) return newRate * 100;
    rate = newRate;
    if (rate < -0.99) rate = -0.99;
    if (rate > 10) rate = 10;
  }
  return rate * 100;
}

function App() {
  return (
    <div className="app-shell w-full min-h-screen flex flex-col items-center px-4 sm:px-6">
      <div className="w-full max-w-[640px]">
        <Header />
        <Analyzer />
        <UpgradeCard />
        <Footer />
      </div>
    </div>
  );
}

function Header() {
  return (
    <div className="pt-8 pb-5 anim-fadeUp">
      <div className="flex items-center gap-2 mb-2 flex-wrap">
        <span className="text-[11px] uppercase tracking-[0.22em]" style={{color: "var(--dim)"}}>Live Underwriting</span>
        <span className="text-[10px] px-2 py-0.5 rounded-full uppercase tracking-wider font-bold"
          style={{background: "rgba(212,145,42,0.10)", color: "var(--gold)", border: "1px solid rgba(212,145,42,0.30)"}}>
          Underwriter · Tier B
        </span>
      </div>
      <h1 className="font-display text-[36px] sm:text-[44px]" style={{lineHeight: 1.02, fontWeight: 700}}>
        Deal Analyzer
      </h1>
      <p className="text-[14px] mt-3" style={{color: "var(--muted)", lineHeight: 1.55}}>
        Full underwriting with multi-year projections. Move the sliders. See IRR, Equity Multiple, and year-by-year cash flows update in real time.
      </p>
    </div>
  );
}

function Analyzer() {
  const [preset, setPreset] = useState("default");
  const [view, setView] = useState("snapshot"); // snapshot | projection

  // Deal
  const [price, setPrice] = useState(PRESETS.default.price);
  const [gpr, setGpr] = useState(PRESETS.default.gpr);
  const [otherIncome, setOtherIncome] = useState(PRESETS.default.otherIncome);
  const [vacancy, setVacancy] = useState(PRESETS.default.vacancy);
  const [opex, setOpex] = useState(PRESETS.default.opex);
  const [mgmt, setMgmt] = useState(PRESETS.default.mgmt);
  // Debt
  const [debt, setDebt] = useState(PRESETS.default.debt);
  const [rate, setRate] = useState(PRESETS.default.rate);
  const [amort, setAmort] = useState(PRESETS.default.amort);
  // Advanced
  const [ioYears, setIoYears] = useState(PRESETS.default.ioYears);
  const [closingPct, setClosingPct] = useState(PRESETS.default.closingPct);
  const [capex, setCapex] = useState(PRESETS.default.capex);
  // Projection
  const [holdYears, setHoldYears] = useState(PRESETS.default.holdYears);
  const [rentGrowth, setRentGrowth] = useState(PRESETS.default.rentGrowth);
  const [expenseGrowth, setExpenseGrowth] = useState(PRESETS.default.expenseGrowth);
  const [exitCap, setExitCap] = useState(PRESETS.default.exitCap);
  const [sellingCosts, setSellingCosts] = useState(PRESETS.default.sellingCosts);

  const [activeExplain, setActiveExplain] = useState(null);
  const [showAdvanced, setShowAdvanced] = useState(false);

  const applyPreset = (key) => {
    const p = PRESETS[key];
    setPreset(key);
    setPrice(p.price); setGpr(p.gpr); setOtherIncome(p.otherIncome); setVacancy(p.vacancy);
    setOpex(p.opex); setMgmt(p.mgmt); setDebt(p.debt); setRate(p.rate);
    setAmort(p.amort); setIoYears(p.ioYears); setClosingPct(p.closingPct); setCapex(p.capex);
    setHoldYears(p.holdYears); setRentGrowth(p.rentGrowth); setExpenseGrowth(p.expenseGrowth);
    setExitCap(p.exitCap); setSellingCosts(p.sellingCosts);
  };

  // ============= YEAR 1 CALC (Tier A logic) =============
  const calc = useMemo(() => {
    const vacancyLoss = gpr * (vacancy / 100);
    const egi = gpr - vacancyLoss + otherIncome;
    const mgmtFee = egi * (mgmt / 100);
    const totalOpex = opex + mgmtFee;
    const noi = egi - totalOpex;

    const closingCosts = price * (closingPct / 100);
    const downPayment = Math.max(price - debt, 0);
    const equity = downPayment + closingCosts + capex;

    const r = (rate / 100) / 12;
    const n = amort * 12;
    const monthlyPI = debt > 0 && r > 0 ? (debt * r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1) : 0;
    const monthlyIO = debt > 0 ? debt * r : 0;
    const inIO = ioYears > 0;
    const monthly = inIO ? monthlyIO : monthlyPI;
    const annualDebt = monthly * 12;

    const cap = (noi / price) * 100;
    const dscr = annualDebt > 0 ? noi / annualDebt : 0;
    const cashFlow = noi - annualDebt;
    const coc = equity > 0 ? (cashFlow / equity) * 100 : 0;

    return { noi, egi, vacancyLoss, mgmtFee, totalOpex, equity, closingCosts, downPayment, monthly, annualDebt, cap, dscr, cashFlow, coc, inIO, monthlyPI };
  }, [price, gpr, otherIncome, vacancy, opex, mgmt, debt, rate, amort, ioYears, closingPct, capex]);

  // ============= MULTI-YEAR PROJECTION =============
  const projection = useMemo(() => {
    const years = [];
    const r = (rate / 100) / 12;
    const n = amort * 12;
    const monthlyPI = debt > 0 && r > 0 ? (debt * r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1) : 0;
    const monthlyIO = debt > 0 ? debt * r : 0;

    let loanBalance = debt;
    let currentGpr = gpr;
    let currentOtherIncome = otherIncome;
    let currentOpex = opex;

    for (let y = 1; y <= holdYears; y++) {
      const inIOPeriod = y <= ioYears;
      const yearMonthly = inIOPeriod ? monthlyIO : monthlyPI;
      const yearDebt = yearMonthly * 12;

      // Compute principal paid this year and update balance
      let yearPrincipal = 0;
      let yearInterest = 0;
      if (debt > 0) {
        if (inIOPeriod) {
          yearInterest = yearDebt;
        } else {
          for (let m = 0; m < 12; m++) {
            const interestM = loanBalance * r;
            const principalM = Math.min(yearMonthly - interestM, loanBalance);
            yearInterest += interestM;
            yearPrincipal += principalM;
            loanBalance -= principalM;
            if (loanBalance < 0) loanBalance = 0;
          }
        }
      }

      const vacancyLoss = currentGpr * (vacancy / 100);
      const egi = currentGpr - vacancyLoss + currentOtherIncome;
      const mgmtFee = egi * (mgmt / 100);
      const totalOpex = currentOpex + mgmtFee;
      const noi = egi - totalOpex;
      const cashFlow = noi - yearDebt;

      years.push({
        year: y,
        gpr: currentGpr,
        otherIncome: currentOtherIncome,
        egi,
        opex: currentOpex,
        mgmtFee,
        totalOpex,
        noi,
        debtService: yearDebt,
        principal: yearPrincipal,
        interest: yearInterest,
        loanBalance,
        cashFlow,
      });

      currentGpr *= (1 + rentGrowth / 100);
      currentOtherIncome *= (1 + rentGrowth / 100);
      currentOpex *= (1 + expenseGrowth / 100);
    }

    // Exit calculation — use Year (holdYears+1) NOI for fwd-looking cap rate convention
    const finalYearNoi = years[years.length - 1].noi * (1 + rentGrowth / 100);
    const grossSalePrice = finalYearNoi / (exitCap / 100);
    const sellingCostsAmt = grossSalePrice * (sellingCosts / 100);
    const netSalePrice = grossSalePrice - sellingCostsAmt;
    const finalLoanBalance = years[years.length - 1].loanBalance;
    const netSaleProceeds = netSalePrice - finalLoanBalance;

    const totalCashFlow = years.reduce((sum, y) => sum + y.cashFlow, 0);
    const totalProceeds = totalCashFlow + netSaleProceeds;
    const profit = totalProceeds - calc.equity;
    const equityMultiple = calc.equity > 0 ? totalProceeds / calc.equity : 0;
    const avgCoC = calc.equity > 0 ? (totalCashFlow / holdYears / calc.equity) * 100 : 0;

    // IRR cash flows: year 0 = -equity, years 1..N-1 = cashFlow, year N = cashFlow + netSaleProceeds
    const irrCashFlows = [-calc.equity];
    for (let i = 0; i < years.length; i++) {
      const cf = years[i].cashFlow + (i === years.length - 1 ? netSaleProceeds : 0);
      irrCashFlows.push(cf);
    }
    const irr = calcIRR(irrCashFlows);

    return {
      years,
      grossSalePrice,
      sellingCostsAmt,
      netSalePrice,
      finalLoanBalance,
      netSaleProceeds,
      totalCashFlow,
      totalProceeds,
      profit,
      equityMultiple,
      avgCoC,
      irr,
    };
  }, [price, gpr, otherIncome, vacancy, opex, mgmt, debt, rate, amort, ioYears, calc.equity, holdYears, rentGrowth, expenseGrowth, exitCap, sellingCosts]);

  const verdict = useMemo(() => {
    if (calc.cashFlow < 0) return { tone: "bad", text: "Negative cash flow year 1. You're feeding this deal every month." };
    if (calc.dscr < 1.2) return { tone: "bad", text: "DSCR too thin. Banks walk. So should you." };
    if (projection.irr >= 15 && calc.dscr >= 1.3) return { tone: "good", text: projection.irr.toFixed(1) + "% IRR. Strong deal. Banks fund it." };
    if (projection.irr >= 10) return { tone: "warn", text: projection.irr.toFixed(1) + "% IRR. Acceptable but not exciting. Stress-test the exit cap." };
    return { tone: "bad", text: projection.irr.toFixed(1) + "% IRR. Better deals exist. Pass." };
  }, [calc, projection]);

  const tone = verdict.tone === "good" ? "var(--accent)" : verdict.tone === "bad" ? "var(--danger)" : "var(--gold)";

  return (
    <div className="anim-fadeUp" style={{animationDelay: "60ms"}}>
      {/* Preset selector */}
      <div className="flex items-center gap-2 mb-4 overflow-x-auto pb-1 no-print" style={{scrollbarWidth: "none"}}>
        {Object.entries(PRESETS).map(([k, p]) => (
          <button key={k} onClick={() => applyPreset(k)}
            className={"seg-btn text-[12px] px-3 py-2 rounded-full whitespace-nowrap font-medium " + (preset === k ? "active" : "")}
            style={preset === k ? {} : {background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--muted)"}}>
            {p.name}
          </button>
        ))}
        <button onClick={() => window.print()}
          className="text-[12px] px-3 py-2 rounded-full whitespace-nowrap font-medium ml-auto"
          style={{background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--muted)"}}>
          Print
        </button>
      </div>

      {/* View tabs */}
      <div className="flex p-1 rounded-xl mb-4 no-print" style={{background: "var(--bg-card)", border: "1px solid var(--border)"}}>
        <button onClick={() => setView("snapshot")}
          className={"tab-btn flex-1 py-2 px-3 rounded-lg text-[13px] font-semibold " + (view === "snapshot" ? "active-tab" : "")}
          style={view !== "snapshot" ? {color: "var(--muted)"} : {}}>
          Snapshot
        </button>
        <button onClick={() => setView("projection")}
          className={"tab-btn flex-1 py-2 px-3 rounded-lg text-[13px] font-semibold " + (view === "projection" ? "active-tab" : "")}
          style={view !== "projection" ? {color: "var(--muted)"} : {}}>
          Projection · {holdYears}yr
        </button>
      </div>

      {view === "snapshot" ? (
        <SnapshotView calc={calc} amort={amort} closingPct={closingPct} setActiveExplain={setActiveExplain} verdict={verdict} tone={tone} projection={projection}/>
      ) : (
        <ProjectionView projection={projection} calc={calc} holdYears={holdYears} setActiveExplain={setActiveExplain} verdict={verdict} tone={tone} exitCap={exitCap} sellingCosts={sellingCosts}/>
      )}

      {/* Helper banner */}
      <div className="flex items-center gap-2 mb-3 p-3 rounded-xl no-print"
        style={{background: "rgba(37,99,235,0.07)", border: "1px solid rgba(37,99,235,0.20)"}}>
        <span style={{color: "var(--info)", fontWeight: 700}}>↓</span>
        <p className="text-[12.5px]" style={{color: "var(--muted)", lineHeight: 1.4}}>
          <span style={{color: "var(--info)", fontWeight: 600}}>Adjust the inputs below.</span> Both Snapshot and Projection react in real time.
        </p>
      </div>

      {/* DEAL section */}
      <SectionHeader title="The Deal"/>
      <div className="card p-4 sm:p-5 space-y-4 mb-4">
        <SliderRow label="Purchase Price" value={price} setValue={setPrice} min={250000} max={15000000} step={50000} fmt={fmtShort}/>
        <SliderRow label="Gross Rental Income" value={gpr} setValue={setGpr} min={20000} max={2000000} step={5000} fmt={fmtShort}/>
        <SliderRow label="Other Income" value={otherIncome} setValue={setOtherIncome} min={0} max={200000} step={1000} fmt={fmtShort} subtitle="Parking, laundry, fees"/>
        <SliderRow label="Vacancy" value={vacancy} setValue={setVacancy} min={0} max={30} step={0.5} fmt={v => v.toFixed(1) + "%"}/>
        <SliderRow label="Operating Expenses" value={opex} setValue={setOpex} min={5000} max={1000000} step={2500} fmt={fmtShort} subtitle="Taxes + insurance + R&M + utilities"/>
        <SliderRow label="Property Mgmt Fee" value={mgmt} setValue={setMgmt} min={0} max={12} step={0.5} fmt={v => v.toFixed(1) + "%"} subtitle="% of EGI"/>
      </div>

      {/* DEBT section */}
      <SectionHeader title="The Debt"/>
      <div className="card p-4 sm:p-5 space-y-4 mb-4">
        <SliderRow label="Loan Amount" value={debt} setValue={setDebt} min={0} max={Math.floor(price * 0.85)} step={25000} fmt={fmtShort} subtitle={((debt/price)*100).toFixed(0) + "% LTV"}/>
        <SliderRow label="Interest Rate" value={rate} setValue={setRate} min={4} max={12} step={0.125} fmt={v => v.toFixed(3) + "%"}/>
        <SliderRow label="Amortization" value={amort} setValue={setAmort} min={15} max={30} step={5} fmt={v => v + " yr"}/>
      </div>

      {/* PROJECTION section */}
      <SectionHeader title="The Projection"/>
      <div className="card p-4 sm:p-5 space-y-4 mb-4">
        <SliderRow label="Hold Period" value={holdYears} setValue={setHoldYears} min={3} max={10} step={1} fmt={v => v + " yr"}/>
        <SliderRow label="Rent Growth" value={rentGrowth} setValue={setRentGrowth} min={0} max={8} step={0.25} fmt={v => v.toFixed(2) + "% / yr"} onExplain={() => setActiveExplain("Rent Growth")}/>
        <SliderRow label="Expense Growth" value={expenseGrowth} setValue={setExpenseGrowth} min={0} max={8} step={0.25} fmt={v => v.toFixed(2) + "% / yr"}/>
        <SliderRow label="Exit Cap Rate" value={exitCap} setValue={setExitCap} min={4} max={12} step={0.1} fmt={v => v.toFixed(2) + "%"} onExplain={() => setActiveExplain("Exit Cap")}/>
        <SliderRow label="Selling Costs" value={sellingCosts} setValue={setSellingCosts} min={0} max={8} step={0.25} fmt={v => v.toFixed(2) + "%"} subtitle="% of sale price" onExplain={() => setActiveExplain("Selling Costs")}/>
      </div>

      {/* Advanced toggle */}
      <button onClick={() => setShowAdvanced(!showAdvanced)}
        className="w-full mb-4 text-left flex items-center justify-between px-4 py-3 rounded-xl no-print"
        style={{background: "var(--bg-card)", border: "1px dashed var(--border-hi)"}}>

/* ===== Auth gate (CRE U auth integration) =========================
   Wraps the app in a login wall + entitlement check.
   Buy buttons redirect to live Stripe Payment Links via STRIPE_LINKS;
   keys with no link yet fall through to a "coming soon" alert. ======= */
const PRODUCT_CODE = "da_b";
const PRODUCT_NAME = "Deal Analyzer · Underwriter";

// Live Stripe Payment Links, keyed by product code.
const STRIPE_LINKS = {
  da_b: "https://buy.stripe.com/4gM14o0zV95LfmOc5V0co03",          // Underwriter
  da_c: "https://buy.stripe.com/5kQ6oI3M7gydgqS1rh0co04",          // Pro
  cre_u_lifetime: "https://buy.stripe.com/bJe3cw6Yjdm1fmOgmb0co05", // CRE University Lifetime
};

function AuthGate({ productCode, productName, children }) {
  const [status, setStatus] = React.useState("loading"); // loading | locked | nosub | ready
  const [user, setUser] = React.useState(null);
  const [mode, setMode] = React.useState("signin"); // signin | signup | forgot
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [error, setError] = React.useState("");
  const [info, setInfo] = React.useState("");

  React.useEffect(() => {
    let unsub;
    let cancelled = false;

    // Decide status for a given session. Calls hasEntitlement (a DB query),
    // so this must only run OUTSIDE supabase-js's auth-change lock.
    const evaluate = async (session) => {
      if (!session) { setUser(null); setStatus("locked"); return; }
      setUser(session.user);
      if (productCode === "cre_u_any") {
        const hasLife = await window.CREAuth.hasEntitlement("cre_u_lifetime");
        const hasMo = await window.CREAuth.hasEntitlement("cre_u_monthly");
        if (!cancelled) setStatus(hasLife || hasMo ? "ready" : "nosub");
        return;
      }
      const hasEnt = await window.CREAuth.hasEntitlement(productCode);
      if (!cancelled) setStatus(hasEnt ? "ready" : "nosub");
    };

    const start = async () => {
      if (!window.CREAuth) {
        await new Promise(r => document.addEventListener("creauth:ready", r, { once: true }));
      }
      // Initial check runs outside any auth lock — safe to query directly.
      const session = await window.CREAuth.getSession();
      evaluate(session);
      // onAuthStateChange fires while supabase-js holds its internal auth lock.
      // Awaiting getSession()/DB calls inside it deadlocks (v2 footgun). So: read
      // the session from the callback args (no re-query) and defer the DB work
      // with setTimeout so it runs after the lock releases.
      const { data: { subscription } } = window.CREAuth.onAuthStateChange((_event, session) => {
        setTimeout(() => { if (!cancelled) evaluate(session); }, 0);
      });
      unsub = () => subscription.unsubscribe();
    };

    start();
    return () => { cancelled = true; if (unsub) unsub(); };
  }, [productCode]);

  const handleSubmit = async (e) => {
    e?.preventDefault();
    setError(""); setInfo("");
    if (mode === "signin") {
      const { error } = await window.CREAuth.signIn(email, password);
      if (error) setError(error.message);
    } else if (mode === "signup") {
      const { error } = await window.CREAuth.signUp(email, password);
      if (error) setError(error.message);
      else setInfo("Check your email to confirm your account.");
    } else if (mode === "forgot") {
      const { error } = await window.CREAuth.resetPassword(email);
      if (error) setError(error.message);
      else setInfo("Password reset link sent. Check your email.");
    }
  };

  const handleBuy = (key) => {
    const url = STRIPE_LINKS[key];
    if (url) { window.location.href = url; return; }
    window.alert("That option is coming soon. You're signed in, so access will appear here automatically once it launches.");
  };

  if (status === "loading") {
    return <div className="min-h-screen flex items-center justify-center text-[14px]" style={{color: "var(--muted)"}}>Loading…</div>;
  }

  if (status === "locked") {
    return (
      <div className="min-h-screen flex items-center justify-center p-4" style={{background: "#E6DFD1"}}>
        <div className="w-full max-w-[420px] card-hi p-6">
          <div className="font-display text-[28px] mb-2" style={{fontWeight: 700}}>
            {mode === "signin" ? "Sign in" : mode === "signup" ? "Create account" : "Reset password"}
          </div>
          <p className="text-[13px] mb-5" style={{color: "var(--muted)"}}>
            {mode === "signin" ? "Welcome back." : mode === "signup" ? "Get started — Deal Analyzer A is included free with signup." : "Enter your email and we'll send a reset link."}
          </p>
          <form onSubmit={handleSubmit}>
            <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} required
              className="w-full px-3 py-2.5 mb-3 text-[14px] rounded-lg"
              style={{background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--text)"}}/>
            {mode !== "forgot" && (
              <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} required minLength={6}
                className="w-full px-3 py-2.5 mb-3 text-[14px] rounded-lg"
                style={{background: "var(--bg-card)", border: "1px solid var(--border)", color: "var(--text)"}}/>
            )}
            {error && <div className="text-[12.5px] mb-3 p-2.5 rounded-lg" style={{background: "rgba(220,38,38,0.08)", color: "var(--danger)"}}>{error}</div>}
            {info && <div className="text-[12.5px] mb-3 p-2.5 rounded-lg" style={{background: "rgba(0,169,104,0.08)", color: "var(--accent)"}}>{info}</div>}
            <button type="submit" className="w-full py-3 text-[13.5px] uppercase tracking-wider font-bold rounded-xl"
              style={{background: "var(--accent)", color: "#FFF"}}>
              {mode === "signin" ? "Sign in" : mode === "signup" ? "Create account" : "Send reset link"}
            </button>
          </form>
          <div className="mt-4 text-[12px] text-center" style={{color: "var(--muted)"}}>
            {mode === "signin" && (
              <>
                <button onClick={() => { setMode("signup"); setError(""); setInfo(""); }} className="underline">Create account</button>
                {" · "}
                <button onClick={() => { setMode("forgot"); setError(""); setInfo(""); }} className="underline">Forgot password</button>
              </>
            )}
            {mode === "signup" && (
              <button onClick={() => { setMode("signin"); setError(""); setInfo(""); }} className="underline">Have an account? Sign in</button>
            )}
            {mode === "forgot" && (
              <button onClick={() => { setMode("signin"); setError(""); setInfo(""); }} className="underline">Back to sign in</button>
            )}
          </div>
        </div>
      </div>
    );
  }

  if (status === "nosub") {
    const isCreU = productCode === "cre_u_any";
    return (
      <div className="min-h-screen flex items-center justify-center p-4" style={{background: "#E6DFD1"}}>
        <div className="w-full max-w-[460px] card-hi p-6 text-center">
          <div className="font-display text-[28px] mb-2" style={{fontWeight: 700}}>
            Unlock {productName}
          </div>
          <p className="text-[13.5px] mb-5" style={{color: "var(--muted)", lineHeight: 1.55}}>
            You're signed in as <b>{user?.email}</b> but don't have access to this product yet.
          </p>
          {isCreU ? (
            <>
              <button onClick={() => handleBuy("cre_u_lifetime")}
                className="block w-full py-3.5 text-[13.5px] uppercase tracking-wider font-bold rounded-xl mb-3"
                style={{background: "linear-gradient(135deg, var(--gold), var(--gold-2))", color: "#3A2700", boxShadow: "0 4px 0 #A77517"}}>
                Lifetime · $399
              </button>
              <button onClick={() => handleBuy("cre_u_monthly")}
                className="block w-full py-3.5 text-[13.5px] uppercase tracking-wider font-bold rounded-xl mb-3"
                style={{background: "var(--accent)", color: "#FFF"}}>
                Monthly · $49 — Coming soon
              </button>
            </>
          ) : productCode === "da_a" ? (
            <p className="text-[13px] mb-4" style={{color: "var(--muted)", lineHeight: 1.55}}>
              This tool is free with your account. Your access is still finalizing — refresh in a moment, and if it persists, sign out and back in.
            </p>
          ) : (
            <button onClick={() => handleBuy(productCode)}
              className="block w-full py-3.5 text-[13.5px] uppercase tracking-wider font-bold rounded-xl mb-3"
              style={{background: "linear-gradient(135deg, var(--gold), var(--gold-2))", color: "#3A2700", boxShadow: "0 4px 0 #A77517"}}>
              Buy now
            </button>
          )}
          <button onClick={() => window.CREAuth.signOut()} className="text-[12px] underline" style={{color: "var(--muted)"}}>
            Sign out
          </button>
        </div>
      </div>
    );
  }

  return children;
}

function GatedApp() {
  return (
    <AuthGate productCode={PRODUCT_CODE} productName={PRODUCT_NAME}>
      <App />
    </AuthGate>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GatedApp />);
</script>
</body>
</html>
